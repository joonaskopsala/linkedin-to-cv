<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d5d7b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0789b3;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="128" height="128" fill="url(#bgGrad)" rx="24"/>
  
  <!-- Document/Paper shape -->
  <g transform="translate(32, 24)">
    <!-- Paper background -->
    <rect x="0" y="0" width="64" height="80" rx="4" fill="#ffffff" opacity="0.95"/>
    
    <!-- Document lines (CV content representation) -->
    <line x1="8" y1="12" x2="56" y2="12" stroke="#0d5d7b" stroke-width="2" stroke-linecap="round"/>
    <line x1="8" y1="22" x2="56" y2="22" stroke="#0d5d7b" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
    
    <!-- Section header -->
    <line x1="8" y1="34" x2="56" y2="34" stroke="#0789b3" stroke-width="2" stroke-linecap="round"/>
    
    <!-- Content lines -->
    <line x1="8" y1="44" x2="48" y2="44" stroke="#5c6872" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
    <line x1="8" y1="50" x2="56" y2="50" stroke="#5c6872" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
    <line x1="8" y1="56" x2="52" y2="56" stroke="#5c6872" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
    
    <!-- Another section -->
    <line x1="8" y1="66" x2="48" y2="66" stroke="#5c6872" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
    <line x1="8" y1="72" x2="56" y2="72" stroke="#5c6872" stroke-width="1" stroke-linecap="round" opacity="0.7"/>
  </g>
  
  <!-- LinkedIn badge indicator (small circle in corner) -->
  <circle cx="100" cy="28" r="14" fill="#0066cc" opacity="0.9"/>
  <text x="100" y="33" font-family="Arial, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" fill="white" opacity="0.95">in</text>
</svg>