<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LinkedIn to CV</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="app">
      <section class="toolbar">
        <!-- PDF upload zone -->
        <label class="upload-zone" id="uploadZone">
          <input type="file" id="pdfInput" accept=".pdf" />
          <div class="upload-zone-content" id="uploadZoneContent">
            <span class="upload-icon">📄</span>
            <span class="upload-label"
              >Drop your LinkedIn PDF here<br />or click to browse</span
            >
            <span class="upload-hint">
              Export from LinkedIn → Me → Save to PDF
            </span>
          </div>
        </label>

        <label class="theme">
          CV Style
          <select id="theme">
            <option value="harvard">Harvard Style</option>
            <option value="editorial">Modern Editorial</option>
            <option value="executive">Executive Minimal</option>
          </select>
        </label>

        <label class="checkbox-label">
          <input type="checkbox" id="reviewSkillsCheckbox" />
          <span>Review &amp; edit skills before export</span>
        </label>

        <button id="exportBtn" class="btn btn-primary" disabled>
          Export CV as PDF
        </button>
      </section>

      <p id="status" class="status">
        Upload your LinkedIn PDF export to get started.
      </p>

      <!-- Skills Review Modal -->
      <div id="skillsModal" class="modal hidden">
        <div class="modal-content">
          <h2>Review Skills</h2>
          <p class="modal-description">
            Check the skills you want to include in your CV. You can also add
            new skills manually.
          </p>

          <div class="skills-section">
            <h3>Extracted Skills</h3>
            <div id="skillsList" class="skills-list"></div>
          </div>

          <div class="add-skill-section">
            <h3>Add New Skill</h3>
            <div class="add-skill-input-group">
              <input
                type="text"
                id="newSkillInput"
                placeholder="Type skill name..."
                class="skill-input"
              />
              <button id="addSkillBtn" class="btn btn-secondary">Add</button>
            </div>
          </div>

          <div class="modal-actions">
            <button id="cancelSkillsBtn" class="btn btn-secondary">
              Cancel
            </button>
            <button id="doneSkillsBtn" class="btn btn-primary">
              Export PDF
            </button>
          </div>
        </div>
      </div>
    </main>

    <script src="../vendor/jspdf.umd.min.js"></script>
    <script src="../vendor/html2canvas.min.js"></script>
    <script type="module" src="popup.js"></script>
  </body>
</html>
